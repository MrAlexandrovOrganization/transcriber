# Standalone Whisper transcription service.
# Run independently: docker compose up -d
#
# Other projects connect by joining the external network "whisper-net":
#
#   networks:
#     whisper-net:
#       external: true
#
# Then set WHISPER_GRPC_HOST=whisper-ingress, WHISPER_GRPC_PORT=50053.

networks:
  whisper-net:
    name: whisper-net

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transcriber
      POSTGRES_USER: transcriber
      POSTGRES_PASSWORD: transcriber
    volumes:
      - whisper-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - whisper-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcriber -d transcriber"]
      interval: 10s
      timeout: 5s
      retries: 10

  whisper-ingress:
    build:
      context: .
      dockerfile: whisper/Dockerfile
    environment:
      GRPC_PORT: 50053
      GRPC_WORKERS: 4
      GRPC_MAX_MESSAGE_BYTES: 52428800
      SERVICE_ROLE: ingress
      DATABASE_URL: postgresql://transcriber:transcriber@postgres:5432/transcriber
      JOB_STORAGE_DIR: /data/jobs
      JOB_MAX_ATTEMPTS: 3
      JOB_LEASE_SECONDS: 900
      JOB_TTL_S: 7200
    volumes:
      - whisper-job-data:/data/jobs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - whisper-net
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import grpc
          ch = grpc.insecure_channel('localhost:50053')
          grpc.channel_ready_future(ch).result(timeout=5)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  whisper-worker:
    build:
      context: .
      dockerfile: whisper/Dockerfile
    environment:
      SERVICE_ROLE: worker
      DATABASE_URL: postgresql://transcriber:transcriber@postgres:5432/transcriber
      JOB_STORAGE_DIR: /data/jobs
      JOB_MAX_ATTEMPTS: 3
      JOB_LEASE_SECONDS: 900
      JOB_TTL_S: 7200
      CLEANUP_INTERVAL_S: 600
      WORKER_POLL_INTERVAL_S: 2
      WHISPER_MODEL: large
      WHISPER_CPU_THREADS: 7
    volumes:
      - whisper-model-cache:/root/.cache/huggingface
      - whisper-job-data:/data/jobs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - whisper-net

volumes:
  whisper-model-cache:
  whisper-job-data:
  whisper-postgres-data:
